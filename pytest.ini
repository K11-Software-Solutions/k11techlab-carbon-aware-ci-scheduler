[pytest]
asyncio_mode = auto

markers =
    agentic: tests that require k11techlab-agentic-ai-qa-system on PYTHONPATH
    e2e:     full end-to-end tests requiring live Carbon Aware SDK + agentic pipeline
    slow:    tests that take more than 10 seconds
    production: read-only production smoke tests; require PROD_BASE_URL

addopts =
    -v
    --tb=short
    -m "not e2e and not slow and not agentic"

testpaths = tests
